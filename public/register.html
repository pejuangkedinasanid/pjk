<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akun | Pejuang Kedinasan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#14274e;--secondary:#1f3f7a;--text:#334155;--border:#e2e8f0;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Open Sans',sans-serif;}
body{background:linear-gradient(135deg,#14274e,#1f3f7a);min-height:100vh;padding:30px;display:flex;justify-content:center;align-items:center;}
.register-wrapper{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:40px;
    overflow:hidden;
    box-shadow:0 35px 80px rgba(0,0,0,.20);
}

.right-side{
    padding:65px 80px;
    overflow-y:auto;
    max-height:100vh;
}

.logo-title{
    font-size:38px;
    font-weight:800;
    letter-spacing:1px;
    color:#14274e;
    text-align:center;
    margin-bottom:8px;
    line-height:1.1;
}

.logo-sub{
    font-size:15px;
    color:#64748b;
    text-align:center;
    margin-bottom:35px;
}

.form-title{
    text-align:center;
    font-size:34px;
    font-weight:800;
    color:#14274e;
    margin-bottom:10px;
}

.form-subtitle{
    text-align:center;
    color:#64748b;
    font-size:15px;
    margin-bottom:40px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    font-weight:700;
    margin-bottom:8px;
    color:#14274e;
    font-size:14px;
}

.form-group input,
.form-group select{
    width:100%;
    padding:16px 18px;
    border:1px solid var(--border);
    border-radius:14px;
    font-size:14px;
    outline:none;
    transition:.2s;
}

.btn-register{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:#14274e;
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    margin-top:15px;
    transition:.3s;
}

.divider{
    border:none;
    border-top:1px solid #f1f5f9;
    margin:28px 0;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.row3{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:18px;
}

@media(max-width:768px){
    body{
        padding:15px;
    }

    .right-side{
        padding:35px 25px;
    }

    .logo-title{
        font-size:28px;
    }

    .form-title{
        font-size:28px;
    }

    .row,
    .row3{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>
<div class="register-wrapper">
  <div class="right-side">
    <div class="logo-title">PEJUANG KEDINASAN</div>
    <div class="logo-sub">Platform Tryout Kedinasan No.1 Indonesia</div>

    <div class="form-title">Buat Akun Baru</div>
    <div class="form-subtitle">Lengkapi data di bawah ini untuk mulai belajar</div>

    <form id="registerForm">

      <!-- Data Diri -->
      <div class="form-group">
        <label>Nama Lengkap *</label>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap sesuai KTP" required>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Username *</label>
          <input type="text" id="username" placeholder="contoh: pejuang123" required>
        </div>
        <div class="form-group">
          <label>No WhatsApp *</label>
          <input type="text" id="whatsapp" placeholder="08xxxxxxxxxx" required>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Email Aktif *</label>
          <input type="email" id="email" placeholder="email@domain.com" required>
        </div>
        <div class="form-group">
          <label>Instagram *</label>
          <input type="text" id="instagram" placeholder="@username_instagram" required>
        </div>
      </div>

      <hr class="divider">

      <!-- Lokasi & Target -->
      <div class="row">
        <div class="form-group">
          <label>Provinsi *</label>
          <select id="provinsi" required>
            <option value="">Pilih Provinsi</option>
            <option>Aceh</option>
            <option>Bali</option>
            <option>Banten</option>
            <option>Bengkulu</option>
            <option>DI Yogyakarta</option>
            <option>DKI Jakarta</option>
            <option>Gorontalo</option>
            <option>Jambi</option>
            <option>Jawa Barat</option>
            <option>Jawa Tengah</option>
            <option>Jawa Timur</option>
            <option>Kalimantan Barat</option>
            <option>Kalimantan Selatan</option>
            <option>Kalimantan Tengah</option>
            <option>Kalimantan Timur</option>
            <option>Kalimantan Utara</option>
            <option>Kepulauan Bangka Belitung</option>
            <option>Kepulauan Riau</option>
            <option>Lampung</option>
            <option>Maluku</option>
            <option>Maluku Utara</option>
            <option>Nusa Tenggara Barat</option>
            <option>Nusa Tenggara Timur</option>
            <option>Papua</option>
            <option>Papua Barat</option>
            <option>Papua Barat Daya</option>
            <option>Papua Pegunungan</option>
            <option>Papua Selatan</option>
            <option>Papua Tengah</option>
            <option>Riau</option>
            <option>Sulawesi Barat</option>
            <option>Sulawesi Selatan</option>
            <option>Sulawesi Tengah</option>
            <option>Sulawesi Tenggara</option>
            <option>Sulawesi Utara</option>
            <option>Sumatera Barat</option>
            <option>Sumatera Selatan</option>
            <option>Sumatera Utara</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tahun Seleksi *</label>
          <select id="tahun_seleksi">
            <option>2026</option>
            <option>2027</option>
            <option>2028</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Sekolah Kedinasan Impian *</label>
        <select id="sekolah_kedinasan" required>
          <option value="">Pilih Sekolah Kedinasan</option>
          <optgroup label="— Kementerian Keuangan —">
            <option value="PKN STAN">PKN STAN (Politeknik Keuangan Negara STAN)</option>
          </optgroup>
          <optgroup label="— Kementerian Dalam Negeri —">
            <option value="IPDN">IPDN (Institut Pemerintahan Dalam Negeri)</option>
          </optgroup>
          <optgroup label="— Badan Intelijen Negara —">
            <option value="STIN">STIN (Sekolah Tinggi Intelijen Negara)</option>
          </optgroup>
          <optgroup label="— BSSN —">
            <option value="Poltek SSN">Politeknik Siber dan Sandi Negara (Poltek SSN)</option>
          </optgroup>
          <optgroup label="— BMKG —">
            <option value="STMKG">STMKG (Sekolah Tinggi Meteorologi Klimatologi dan Geofisika)</option>
          </optgroup>
          <optgroup label="— Kementerian Hukum —">
            <option value="Poltekim">Poltekim (Politeknik Imigrasi)</option>
            <option value="Poltekip">Poltekip (Politeknik Ilmu Pemasyarakatan)</option>
          </optgroup>
          <optgroup label="— Kementerian Perhubungan —">
            <option value="STTD">STTD (Sekolah Tinggi Transportasi Darat)</option>
            <option value="STIP">STIP (Sekolah Tinggi Ilmu Pelayaran)</option>
            <option value="PKTJ">PKTJ (Politeknik Keselamatan Transportasi Jalan)</option>
            <option value="PIP Semarang">PIP Semarang (Politeknik Ilmu Pelayaran Semarang)</option>
            <option value="PIP Makassar">PIP Makassar (Politeknik Ilmu Pelayaran Makassar)</option>
            <option value="Poltekpel Surabaya">Poltekpel Surabaya</option>
            <option value="Poltekpel Barombong">Poltekpel Barombong</option>
            <option value="Poltekpel Banten">Poltekpel Banten</option>
            <option value="Poltekpel Sorong">Poltekpel Sorong</option>
            <option value="Politeknik Penerbangan Indonesia Curug">Politeknik Penerbangan Indonesia Curug</option>
            <option value="Politeknik Penerbangan Makassar">Politeknik Penerbangan Makassar</option>
            <option value="Politeknik Penerbangan Jayapura">Politeknik Penerbangan Jayapura</option>
            <option value="Politeknik Penerbangan Surabaya">Politeknik Penerbangan Surabaya</option>
            <option value="Politeknik Penerbangan Medan">Politeknik Penerbangan Medan</option>
            <option value="Politeknik Perkeretaapian Indonesia Madiun">Politeknik Perkeretaapian Indonesia Madiun</option>
          </optgroup>
          <optgroup label="— BPS —">
            <option value="Politeknik Statistika STIS">Politeknik Statistika STIS</option>
          </optgroup>
          <optgroup label="— Kementerian ATR/BPN —">
            <option value="STPN">STPN (Sekolah Tinggi Pertanahan Nasional)</option>
          </optgroup>
          <optgroup label="— TNI —">
            <option value="AKMIL">AKMIL (Akademi Militer)</option>
            <option value="AAL">AAL (Akademi Angkatan Laut)</option>
            <option value="AAU">AAU (Akademi Angkatan Udara)</option>
            <option value="AKABRI">Sekolah Calon Perwira TNI</option>
          </optgroup>
          <optgroup label="— POLRI —">
            <option value="AKPOL">AKPOL (Akademi Kepolisian)</option>
            <option value="SIPSS">SIPSS (Sekolah Inspektur Polisi Sumber Sarjana)</option>
            <option value="BINTARA POLRI">Bintara Polri</option>
          </optgroup>
          <optgroup label="— Lainnya —">
            <option value="STIN Lainnya">Sekolah Kedinasan Lainnya</option>
          </optgroup>
        </select>
      </div>

      <div class="form-group">
        <label>Dari Mana Mengetahui Pejuang Kedinasan? *</label>
        <select id="source" required>
          <option value="">Pilih Salah Satu</option>
          <option>TikTok</option>
          <option>Instagram</option>
          <option>YouTube</option>
          <option>Google</option>
          <option>Teman</option>
          <option>Telegram</option>
          <option>Twitter / X</option>
          <option>Lainnya</option>
        </select>
      </div>

      <hr class="divider">

      <!-- Password -->
      <div class="row">
        <div class="form-group">
          <label>Password *</label>
          <input type="password" id="password" placeholder="Minimal 8 karakter" required>
        </div>
        <div class="form-group">
          <label>Konfirmasi Password *</label>
          <input type="password" id="confirmPassword" placeholder="Ulangi Password" required>
          <div id="passwordError" class="error">Password tidak sama</div>
        </div>
      </div>

      <button type="submit" id="registerBtn" class="btn-register">Daftar Akun</button>
    </form>

    <div style="text-align:center;margin-top:18px;font-size:13px;color:#64748b;">
      Sudah punya akun?
      <a href="login.html" style="color:#14274e;font-weight:700;text-decoration:none;">Masuk Sekarang</a>
    </div>
  </div>
</div>

<script>
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const passwordError = document.getElementById("passwordError");

function validatePassword() {
  if (confirmPassword.value !== "" && password.value !== confirmPassword.value) {
    passwordError.style.display = "block";
    return false;
  }
  passwordError.style.display = "none";
  return true;
}
password.addEventListener("input", validatePassword);
confirmPassword.addEventListener("input", validatePassword);

document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  if (!validatePassword()) return;

  const btn = document.getElementById("registerBtn");
  btn.disabled = true;
  btn.innerHTML = "Membuat Akun...";

  const email = document.getElementById("email").value.trim().toLowerCase();

  try {
    const res = await fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        nama: document.getElementById("nama").value,
        username: document.getElementById("username").value,
        email: email,
        password: document.getElementById("password").value,
        whatsapp: document.getElementById("whatsapp").value,
        instagram: document.getElementById("instagram").value,
        provinsi: document.getElementById("provinsi").value,
        tahun_seleksi: document.getElementById("tahun_seleksi").value,
        sekolah_kedinasan: document.getElementById("sekolah_kedinasan").value,
        source: document.getElementById("source").value,
      })
    });

    const data = await res.json();

    if (!data.success) {
      alert(data.message || "Gagal mendaftar. Silakan coba lagi.");
      btn.disabled = false;
      btn.innerHTML = "Daftar Akun";
      return;
    }

    if (!data.otp_sent) {
      // Akun sudah dibuat, OTP gagal terkirim -- tetap arahkan ke
      // halaman OTP, di sana ada tombol "Kirim Ulang OTP".
      alert(data.message || "Akun dibuat, tapi OTP gagal terkirim. Coba kirim ulang di halaman berikutnya.");
    }

    window.location.href = "otp.html?email=" + encodeURIComponent(data.email || email);

  } catch (err) {
    console.error(err);
    alert("Terjadi kesalahan sistem");
    btn.disabled = false;
    btn.innerHTML = "Daftar Akun";
  }
});
</script>
</body>
</html>
