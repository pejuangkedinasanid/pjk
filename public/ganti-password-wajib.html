<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganti Password Wajib | Pejuang Kedinasan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#14274e;--primary-light:#1f3f7a;--white:#ffffff;--gray:#64748b;--border:#e2e8f0;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Open Sans',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#14274e,#1f3f7a);display:flex;align-items:center;justify-content:center;padding:30px;}
.box{width:100%;max-width:480px;background:white;border-radius:28px;padding:45px 40px;box-shadow:0 25px 60px rgba(0,0,0,.18);}
.icon-wrap{width:64px;height:64px;border-radius:50%;background:#fff7ed;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px;}
.title{font-size:24px;font-weight:800;color:#14274e;text-align:center;margin-bottom:12px;}
.desc{font-size:14px;color:#64748b;text-align:center;line-height:1.7;margin-bottom:30px;}
.form-group{margin-bottom:20px;}
.form-group label{display:block;margin-bottom:8px;font-weight:700;color:#14274e;font-size:14px;}
.form-group input{width:100%;padding:15px;border:1px solid var(--border);border-radius:14px;font-size:15px;outline:none;transition:.3s;}
.form-group input:focus{border-color:#14274e;box-shadow:0 0 0 4px rgba(20,39,78,.08);}
.btn{width:100%;padding:16px;background:#14274e;border:none;border-radius:14px;color:white;font-size:16px;font-weight:700;cursor:pointer;transition:.3s;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.msg{margin-top:16px;font-size:14px;padding:10px 16px;border-radius:10px;display:none;text-align:center;}
.msg.error{background:#fef2f2;color:#dc2626;display:block;}
.msg.success{background:#f0fdf4;color:#16a34a;display:block;}
.logout-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:#94a3b8;text-decoration:none;}
</style>
</head>
<body>
<div class="box">
  <div class="icon-wrap">🔒</div>
  <div class="title">Ganti Password Wajib</div>
  <div class="desc">
    Demi keamanan akun Anda, kami memperbarui sistem penyimpanan password.
    Silakan buat password baru sebelum melanjutkan ke dashboard.
  </div>

  <form onsubmit="submitReset(event)">
    <div class="form-group">
      <label>Password Baru</label>
      <input type="password" id="passwordBaru" placeholder="Minimal 8 karakter" required minlength="8">
    </div>
    <div class="form-group">
      <label>Konfirmasi Password Baru</label>
      <input type="password" id="konfirmasi" placeholder="Ulangi password baru" required minlength="8">
    </div>
    <button type="submit" class="btn" id="btnSubmit">Simpan & Lanjutkan</button>
  </form>

  <div id="msg" class="msg"></div>

  <a href="#" onclick="logout(); return false;" class="logout-link">Keluar dari akun ini</a>
</div>

<script>
function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + type;
}

function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

async function submitReset(event) {
  event.preventDefault();
  const btn = document.getElementById("btnSubmit");
  const passwordBaru = document.getElementById("passwordBaru").value;
  const konfirmasi   = document.getElementById("konfirmasi").value;

  if (passwordBaru !== konfirmasi) {
    showMsg("Password dan konfirmasi tidak sama.", "error");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Menyimpan...";

  try {
    const res = await fetch("/api/auth/reset-password-wajib", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ passwordBaru }),
    });
    const result = await res.json();

    if (!res.ok || !result.success) {
      showMsg(result.message || "Gagal menyimpan password baru.", "error");
      btn.disabled = false;
      btn.textContent = "Simpan & Lanjutkan";
      return;
    }

    // Update juga localStorage supaya dashboard tidak redirect balik
    const rawUser = localStorage.getItem("user");
    if (rawUser) {
      const user = JSON.parse(rawUser);
      user.harus_reset_password = false;
      localStorage.setItem("user", JSON.stringify(user));
    }

    showMsg("Password berhasil diperbarui! Mengalihkan...", "success");
    setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);

  } catch (err) {
    console.error(err);
    showMsg("Terjadi kesalahan sistem.", "error");
    btn.disabled = false;
    btn.textContent = "Simpan & Lanjutkan";
  }
}

// Kalau ada yang buka halaman ini padahal tidak login sama sekali
const rawUser = localStorage.getItem("user");
if (!rawUser) window.location.href = "login.html";
</script>
</body>
</html>
